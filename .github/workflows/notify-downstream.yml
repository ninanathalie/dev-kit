# Notify Downstream Repos Workflow
#
# Triggers when main/master branch is updated (e.g., after a release merge).
# Opens an issue in each registered downstream repo to notify them
# that new dev-kit updates are available.
#
# Reads: downstream-repos.yml (list of repos using dev-kit)
#
# Required secrets:
#   DEV_KIT_TOKEN — A GitHub PAT with repo access to downstream repos.
#                   The default GITHUB_TOKEN only has access to this repo.
#
# To generate a PAT:
#   GitHub → Settings → Developer Settings → Personal Access Tokens → Fine-grained
#   Permissions: Issues (read/write) on the target repos

name: Notify Downstream Repos

on:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    name: Notify Downstream
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changelog since last notification
        id: changelog
        run: |
          # Get commits since the last tag (or last 10 commits if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --reverse)
          else
            CHANGES=$(git log -10 --pretty=format:"- %s" --reverse)
          fi

          # Write to file to preserve newlines
          echo "$CHANGES" > /tmp/changelog.txt
          echo "Generated changelog with $(echo "$CHANGES" | wc -l | tr -d ' ') entries"

      - name: Read downstream repos
        id: repos
        run: |
          # Parse downstream-repos.yml — extract uncommented repo entries
          REPOS=$(grep -E '^\s+-\s+' downstream-repos.yml | sed 's/.*-\s*//' | tr -d '[:space:]' | grep -v '^#' || true)

          if [ -z "$REPOS" ]; then
            echo "No downstream repos registered — skipping notification."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            # Write repos to file, one per line
            echo "$REPOS" > /tmp/repos.txt
            echo "Found repos: $(cat /tmp/repos.txt | tr '\n' ', ')"
          fi

      - name: Open issues in downstream repos
        if: steps.repos.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.DEV_KIT_TOKEN }}
        run: |
          CHANGELOG=$(cat /tmp/changelog.txt)
          REPOS=$(cat /tmp/repos.txt)

          for repo in $REPOS; do
            # Skip empty lines
            [ -z "$repo" ] && continue

            echo "Notifying $repo..."

            gh issue create --repo "$repo" \
              --title "chore(deps): dev-kit templates have been updated" \
              --label "chore,dependencies" \
              --body "$(cat <<EOF
          ## dev-kit Update Available

          New changes have been pushed to [dev-kit](https://github.com/ninanathalie/dev-kit).

          ### What Changed
          $CHANGELOG

          ### How to Update
          Run the update script from your project root:
          \`\`\`bash
          bash /path/to/dev-kit/scripts/update.sh
          \`\`\`

          The script will show you what changed and let you selectively apply updates.

          ---
          *This issue was automatically created by the dev-kit [notify-downstream](https://github.com/ninanathalie/dev-kit/blob/main/.github/workflows/notify-downstream.yml) workflow.*
          EOF
            )" 2>&1 || echo "  WARNING: Failed to create issue in $repo (check PAT permissions)"

          done
