# docker-compose.yml — Vue.js/Vite
#
# Profiles:
#   dev:  Local development with hot reload
#   prod: Production-like container with nginx
#
# Usage:
#   docker compose --profile dev up
#   docker compose --profile prod up

services:
  dev:
    image: node:20-alpine
    profiles: ["dev"]
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    env_file:
      - .env.local
    command: sh -c "npm install && npm run dev -- --host"

  prod:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["prod"]
    ports:
      - "80:80"

volumes:
  node_modules:
