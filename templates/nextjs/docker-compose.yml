# docker-compose.yml — Next.js
#
# Profiles:
#   dev:  Local development with hot reload (no Docker build needed)
#   prod: Production-like container for testing before deploy
#
# Usage:
#   docker compose --profile dev up        # Development with hot reload
#   docker compose --profile prod up       # Production build

services:
  # ─── Development ───────────────────────────────────────────────────────────────
  dev:
    image: node:20-alpine
    profiles: ["dev"]
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - .env.local
    command: sh -c "npm install && npm run dev"

  # ─── Production ────────────────────────────────────────────────────────────────
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["prod"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production

volumes:
  # Named volume to persist node_modules across dev restarts
  node_modules:
