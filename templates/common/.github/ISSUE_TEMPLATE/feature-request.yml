name: Feature Request
description: Suggest a new feature or enhancement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature? Fill out the sections below so we can evaluate and plan it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief description of the feature you'd like.
      placeholder: "What do you want to add or change?"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
      placeholder: "As a [user/developer], I want [goal] so that [reason]."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you think this should be implemented?
      placeholder: "Describe the approach, UI changes, API design, etc."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any mockups, references, or related issues.
    validations:
      required: false
