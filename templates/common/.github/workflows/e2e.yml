# E2E Testing Workflow (Playwright)
#
# Runs end-to-end tests after CI passes.
# Tests execute in real browsers (Chromium, Firefox, WebKit).
#
# This workflow runs separately from CI because E2E tests are slower
# and depend on a running dev/build server.
#
# Skips automatically if:
#   - No playwright.config.ts exists (E2E not configured yet)
#   - PR is from Dependabot (dependency-only changes)
#
# Artifacts: HTML report and traces are uploaded on failure for debugging.

name: E2E Tests

on:
  pull_request:
    branches:
      - develop
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Skip Dependabot PRs — they only change dependency versions, not app behavior
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Playwright is configured
        id: check
        run: |
          if [ -f "playwright.config.ts" ] || [ -f "playwright.config.js" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Playwright config found — running E2E tests"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "No playwright.config found — skipping E2E tests"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        if: steps.check.outputs.configured == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.check.outputs.configured == 'true'
        run: npx playwright test --project=chromium

      - name: Upload test report
        if: failure() && steps.check.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces
        if: failure() && steps.check.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
